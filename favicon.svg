<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="#2E7D32" stroke-linecap="round" stroke-linejoin="round">
  <!-- trunk -->
  <line x1="16" y1="31" x2="16" y2="18" stroke-width="2.5"/>
  <!-- lower branches -->
  <line x1="16" y1="24" x2="5"  y2="17" stroke-width="2"/>
  <line x1="16" y1="24" x2="27" y2="17" stroke-width="2"/>
  <!-- middle branches -->
  <line x1="16" y1="19" x2="8"  y2="12" stroke-width="1.5"/>
  <line x1="16" y1="19" x2="24" y2="12" stroke-width="1.5"/>
  <!-- upper center -->
  <line x1="16" y1="14" x2="16" y2="4"  stroke-width="1.5"/>
  <!-- upper side branches -->
  <line x1="16" y1="13" x2="9"  y2="7"  stroke-width="1.5"/>
  <line x1="16" y1="13" x2="23" y2="7"  stroke-width="1.5"/>
  <!-- tips: center -->
  <line x1="16" y1="8"  x2="12" y2="3"  stroke-width="1"/>
  <line x1="16" y1="8"  x2="20" y2="3"  stroke-width="1"/>
  <!-- tips: left -->
  <line x1="9"  y1="7"  x2="5"  y2="3"  stroke-width="1"/>
  <!-- tips: right -->
  <line x1="23" y1="7"  x2="27" y2="3"  stroke-width="1"/>
</svg>
